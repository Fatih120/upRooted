site_name: Uprooted
site_url: https://the-uprooted-project.github.io/uprooted
site_description: Client mod framework for Root Communications
repo_url: https://github.com/The-Uprooted-Project/uprooted
repo_name: The-Uprooted-Project/uprooted

theme:
  name: material
  palette:
    - scheme: slate
      primary: custom
      accent: green
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - scheme: default
      primary: custom
      accent: green
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.tabbed:
      alternate_style: true
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Building from Source: getting-started/building.md
  - Plugins:
    - Overview: plugins/overview.md
    - Getting Started: plugins/getting-started.md
    - API Reference: plugins/api-reference.md
  - Themes:
    - Overview: themes/overview.md
    - Custom Themes: themes/custom-themes.md
  - Reference:
    - Architecture: reference/architecture.md
    - Hook Reference: reference/hook-reference.md
    - TypeScript Reference: reference/typescript-reference.md
  - Contributing: contributing.md
