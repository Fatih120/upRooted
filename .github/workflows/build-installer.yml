name: Build Installer

on:
  workflow_dispatch:
  push:
    paths:
      - "hook/**"
      - "src/**"
      - "installer/**"
      - "tools/uprooted_profiler.c"
      - "tools/uprooted_profiler.def"
      - "tools/uprooted_profiler_linux.c"
      - ".github/workflows/build-installer.yml"
      - ".github/workflows/build-linux.yml"

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    env:
      CC: cl.exe
      CXX: cl.exe
      CARGO_TARGET_X86_64_PC_WINDOWS_MSVC_LINKER: link.exe
    steps:
      - uses: actions/checkout@v4

      # ── Toolchains ──

      - name: Setup MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1

      - name: Setup .NET 10 Preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: installer/src-tauri

      # ── Install deps ──

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # ── Build artifacts ──

      - name: Create artifacts directory
        run: New-Item -ItemType Directory -Path installer\src-tauri\artifacts -Force

      - name: Build TypeScript layer
        run: |
          if (Test-Path scripts\build.ts) {
            pnpm build
          } else {
            Write-Host "No build script found, using prebuilt dist/"
          }

      - name: Stage JS + CSS
        run: |
          Copy-Item dist\uprooted-preload.js installer\src-tauri\artifacts\
          Copy-Item dist\uprooted.css installer\src-tauri\artifacts\

      - name: Build UprootedHook.dll
        run: dotnet build hook -c Release -o hook/_out

      - name: Stage Hook DLL + deps + JS scripts
        run: |
          Copy-Item hook\_out\UprootedHook.dll installer\src-tauri\artifacts\
          Copy-Item hook\_out\UprootedHook.deps.json installer\src-tauri\artifacts\
          foreach ($js in @("nsfw-filter.js", "link-embeds.js")) {
            $src = "hook\_out\$js"
            if (Test-Path $src) {
              Copy-Item $src installer\src-tauri\artifacts\
              Write-Host "  Staged $js"
            } else {
              throw "Missing JS script from hook build: $js"
            }
          }

      - name: Compile profiler DLL (stripped)
        run: cl.exe /LD /O2 /GS- /Fe:installer\src-tauri\artifacts\uprooted_profiler.dll tools\uprooted_profiler.c /link ole32.lib kernel32.lib shell32.lib /DEF:tools\uprooted_profiler.def /DEBUG:NONE /OPT:REF /OPT:ICF

      - name: Verify staged artifacts
        run: |
          $files = @(
            "uprooted_profiler.dll",
            "UprootedHook.dll",
            "UprootedHook.deps.json",
            "uprooted-preload.js",
            "uprooted.css",
            "nsfw-filter.js",
            "link-embeds.js"
          )
          foreach ($f in $files) {
            $p = "installer\src-tauri\artifacts\$f"
            if (-not (Test-Path $p)) { throw "Missing artifact: $f" }
            $size = (Get-Item $p).Length
            if ($size -eq 0) { throw "Empty artifact: $f" }
            Write-Host "  $f ($size bytes)"
          }

      # ── Build installer (console TUI) ──

      - name: Build installer
        working-directory: installer/src-tauri
        run: cargo build --release

      - name: Rename installer exe
        run: |
          $src = "installer\src-tauri\target\release\uprooted.exe"
          $dst = "installer\src-tauri\target\release\Uprooted-0.3.42-Setup.exe"
          Move-Item $src $dst
          Write-Host "Renamed to Uprooted-0.3.42-Setup.exe"

      - name: Upload installer exe
        uses: actions/upload-artifact@v4
        with:
          name: Uprooted
          path: installer/src-tauri/target/release/Uprooted-*-Setup.exe

      - name: Publish to public repo release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          if (-not $env:GH_TOKEN) {
            Write-Host "PUBLIC_REPO_TOKEN not configured, skipping public release"
            exit 0
          }
          $version = "0.3.42"
          $exe = Get-Item "installer\src-tauri\target\release\Uprooted-$version-Setup.exe"
          Write-Host "Uploading $($exe.Name) to watchthelight/uprooted v$version"
          gh release create "v$version" --repo watchthelight/uprooted --title "v$version" --notes "Windows installer" --draft 2>&1
          gh release upload "v$version" $exe.FullName --repo watchthelight/uprooted --clobber 2>&1
          if ($LASTEXITCODE -ne 0) { Write-Host "Release upload failed or no release found, skipping" }
