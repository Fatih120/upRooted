name: Build Linux Installer

on:
  workflow_dispatch:
  push:
    paths:
      - "hook/**"
      - "src/**"
      - "installer/**"
      - "tools/uprooted_profiler_linux.c"
      - "packaging/arch/**"
      - ".github/workflows/build-linux.yml"

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # ── Toolchains ──

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc

      - name: Setup .NET 10 Preview
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"
          dotnet-quality: "preview"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: installer/src-tauri

      # ── Install deps ──

      - name: Install Node dependencies
        run: pnpm install --frozen-lockfile

      # ── Build artifacts ──

      - name: Create artifacts directory
        run: mkdir -p installer/src-tauri/artifacts

      - name: Build TypeScript layer
        run: |
          if [ -f scripts/build.ts ]; then
            pnpm build
          else
            echo "No build script found, using prebuilt dist/"
          fi

      - name: Stage JS + CSS
        run: |
          cp dist/uprooted-preload.js installer/src-tauri/artifacts/
          cp dist/uprooted.css installer/src-tauri/artifacts/

      - name: Build UprootedHook.dll
        run: dotnet build hook -c Release -o hook/_out

      - name: Stage Hook DLL + deps + JS scripts
        run: |
          cp hook/_out/UprootedHook.dll installer/src-tauri/artifacts/
          cp hook/_out/UprootedHook.deps.json installer/src-tauri/artifacts/
          for js in nsfw-filter.js link-embeds.js; do
            src="hook/_out/$js"
            if [ -f "$src" ]; then
              cp "$src" installer/src-tauri/artifacts/
              echo "  Staged $js"
            else
              echo "Missing JS script from hook build: $js" && exit 1
            fi
          done

      - name: Compile profiler .so (stripped)
        run: gcc -shared -fPIC -O2 -s -fvisibility=hidden -o installer/src-tauri/artifacts/libuprooted_profiler.so tools/uprooted_profiler_linux.c

      - name: Verify staged artifacts
        run: |
          for f in libuprooted_profiler.so UprootedHook.dll UprootedHook.deps.json uprooted-preload.js uprooted.css nsfw-filter.js link-embeds.js; do
            path="installer/src-tauri/artifacts/$f"
            [ -f "$path" ] || { echo "Missing: $f"; exit 1; }
            [ -s "$path" ] || { echo "Empty: $f"; exit 1; }
            echo "  $f ($(stat -c%s "$path") bytes)"
          done

      - name: Package artifacts tarball for bash installer --prebuilt
        run: |
          tar -czf uprooted-linux-artifacts.tar.gz \
            -C installer/src-tauri/artifacts \
            libuprooted_profiler.so UprootedHook.dll UprootedHook.deps.json \
            uprooted-preload.js uprooted.css nsfw-filter.js link-embeds.js

      # ── Build installer (console TUI) ──

      - name: Build installer
        working-directory: installer/src-tauri
        run: cargo build --release

      - name: Rename Linux binary
        run: |
          mv installer/src-tauri/target/release/uprooted installer/src-tauri/target/release/Uprooted-0.3.43-linux-amd64
          chmod +x installer/src-tauri/target/release/Uprooted-0.3.43-linux-amd64
          echo "Renamed to Uprooted-0.3.43-linux-amd64"

      - name: Upload Linux binary
        uses: actions/upload-artifact@v4
        with:
          name: Uprooted-Linux
          path: installer/src-tauri/target/release/Uprooted-0.3.43-linux-amd64

      - name: Upload artifacts tarball
        uses: actions/upload-artifact@v4
        with:
          name: Uprooted-Linux-artifacts
          path: uprooted-linux-artifacts.tar.gz

      - name: Publish to public repo release
        if: success()
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "PUBLIC_REPO_TOKEN not configured, skipping public release"
            exit 0
          fi
          VERSION="0.3.43"
          echo "Uploading Linux artifacts to watchthelight/uprooted v$VERSION"
          gh release create "v$VERSION" --repo watchthelight/uprooted --title "v$VERSION" --notes "Linux installer" --draft 2>/dev/null || true
          for f in installer/src-tauri/target/release/Uprooted-*-linux-amd64 \
                   uprooted-linux-artifacts.tar.gz; do
            [ -f "$f" ] && gh release upload "v$VERSION" "$f" --repo watchthelight/uprooted --clobber || true
          done
