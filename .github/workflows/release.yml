name: Release

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v0.5.0)'
        required: true

permissions:
  contents: write

jobs:
  # ── Extract version from release tag ──
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      prerelease: ${{ steps.ver.outputs.prerelease }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "release" ]; then
            TAG="${GITHUB_REF_NAME}"
          else
            TAG="${{ inputs.tag }}"
          fi
          VERSION="${TAG#v}"
          PRERELEASE="${{ github.event.release.prerelease || 'false' }}"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "Release: $TAG (version=$VERSION, prerelease=$PRERELEASE)"

  # ── Build all platforms ──
  build:
    needs: prepare
    uses: ./.github/workflows/build.yml
    with:
      version: ${{ needs.prepare.outputs.version }}

  # ── Upload artifacts to the GitHub release ──
  upload:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: _release

      - name: List release assets
        run: ls -lah _release/

      - name: Upload all assets to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for f in _release/*; do
            echo "Uploading: $(basename "$f")"
            gh release upload "$TAG" "$f" --clobber \
              --repo "${{ github.repository }}" || true
          done

  # ── Publish to public repo (non-prerelease only) ──
  publish-public:
    needs: [prepare, upload]
    if: needs.prepare.outputs.prerelease != 'true'
    runs-on: ubuntu-latest
    env:
      VERSION: ${{ needs.prepare.outputs.version }}
      TAG: ${{ needs.prepare.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          name: release-artifacts
          path: _release

      - name: Create public release
        env:
          GH_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          if [ -z "$GH_TOKEN" ]; then
            echo "PUBLIC_REPO_TOKEN not configured, skipping"
            exit 0
          fi

          # Create release with notes from NEXT-RELEASE.md
          NOTES_FILE="NEXT-RELEASE.md"
          if [ ! -f "$NOTES_FILE" ]; then
            NOTES_FILE=""
          fi

          gh release create "$TAG" \
            --repo The-Uprooted-Project/uprooted \
            --title "$TAG" \
            ${NOTES_FILE:+--notes-file "$NOTES_FILE"} \
            ${NOTES_FILE:---notes "Release $TAG"} \
            || true

          for f in _release/*; do
            gh release upload "$TAG" "$f" \
              --repo The-Uprooted-Project/uprooted \
              --clobber || true
          done
          echo "Published to public repo: $TAG"

  # ── Update package managers (non-prerelease only) ──
  update-packages:
    needs: [prepare, upload]
    if: needs.prepare.outputs.prerelease != 'true'
    uses: ./.github/workflows/publish-packages.yml
    with:
      version: ${{ needs.prepare.outputs.version }}
    secrets: inherit
